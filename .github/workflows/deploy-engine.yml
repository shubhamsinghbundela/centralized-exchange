name: Build and Deploy Engine

on:
  push:
    branches:
      - main
    paths:
      - "engine/**"
      - ".github/workflows/deploy-engine.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Engine Image
        uses: docker/build-push-action@v6
        with:
          context: ./engine
          file: ./engine/Dockerfile
          push: true
          no-cache: true
          build-args: |
            DATABASE_URL=${{ secrets.ENGINE_DATABASE_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cex-engine:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cex-engine:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Engine
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |

            set -e

            docker rm -f cex-engine || true

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cex-engine:${{ github.sha }}

            docker run -d \
              --name cex-engine \
              --network cex-network \
              -e DATABASE_URL="${{ secrets.ENGINE_DATABASE_URL }}" \
              -e REDIS_URL="${{ secrets.REDIS_URL }}" \
              -e INCOMING_QUEUE="${{ secrets.INCOMING_QUEUE }}" \
              -e MARKET_CLOSE_CRON="${{ secrets.MARKET_CLOSE_CRON }}" \
              -e MARKET_TIMEZONE="${{ secrets.MARKET_TIMEZONE }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/cex-engine:${{ github.sha }}

            docker image prune -f
