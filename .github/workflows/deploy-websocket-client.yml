name: Build and Deploy WebSocket Client

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "websocket-client/**"
      - ".github/workflows/deploy-websocket-client.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push WebSocket Client Image
        uses: docker/build-push-action@v6
        with:
          context: ./websocket-client
          file: ./websocket-client/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cex-websocket-client:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cex-websocket-client:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy WebSocket Client to DigitalOcean
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e
            docker rm -f cex-websocket-client || true

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cex-websocket-client:${{ github.sha }}

            docker run -d \
              --name cex-websocket-client \
              --network cex-network \
              -e WS_URL="${{ secrets.WS_URL }}" \
              -e BACKEND_URL="${{ secrets.BACKEND_URL }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/cex-websocket-client:${{ github.sha }}

            docker image prune -f
