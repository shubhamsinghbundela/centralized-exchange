name: Build and Push WebSocket Client

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "websocket-client/**"
      - ".github/workflows/deploy-websocket-client.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push WebSocket Client Image
        uses: docker/build-push-action@v6
        with:
          context: ./websocket-client
          file: ./websocket-client/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cex-websocket-client:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cex-websocket-client:latest
