name: Build and Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          build-args: |
            DATABASE_URL=${{ secrets.BACKEND_DATABASE_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cex-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cex-backend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            docker container prune -f
            docker image prune -a -f --filter "until=24h"
            docker builder prune -f --filter "until=24h"

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cex-backend:${{ github.sha }}

            docker rm -f cex-backend || true

            docker run -d \
              --name cex-backend \
              --network cex-network \
              -e DATABASE_URL="${{ secrets.BACKEND_DATABASE_URL }}" \
              -e REDIS_URL="redis://redis-stack:6379" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e INCOMING_QUEUE="${{ secrets.INCOMING_QUEUE }}" \
              -e BACKEND_QUEUE_ID="${{ secrets.BACKEND_QUEUE_ID }}" \
              -e ENGINE_TIMEOUT_MS="${{ secrets.ENGINE_TIMEOUT_MS }}" \
              -p 3000:3000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/cex-backend:${{ github.sha }}

            docker image prune -f
